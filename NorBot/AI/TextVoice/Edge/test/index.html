<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Texto a Voz con Bark</title>
</head>
<body>
    <h2>Texto a Voz con Bark</h2>
    <input type="text" id="texto" placeholder="Escribe aquí tu texto" style="width:300px" />
    <button id="btnEnviar" onclick="edgePlay(document.getElementById('texto').value, 'es-ES-ElviraNeural')">Enviar</button>

    <script>

        function edgePlay(text, voice) {

            const xhr = new XMLHttpRequest();      
            xhr.open("POST", "http://127.0.0.1:5005/generate", true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.responseType = "blob";

            xhr.onload = function () {
                if (xhr.status === 200) {
                    const blob = xhr.response;
                    const url = URL.createObjectURL(blob);
                    const audio = new Audio(url);
                    audio.play();
                }
            }
            xhr.send(JSON.stringify({ text: text, voice: voice }));
        }

    </script>
</body>
</html>
