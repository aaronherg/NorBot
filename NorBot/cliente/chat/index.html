<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ChatGo</title>
  <link rel="icon" href="../imagenes/iconos/ico_logo.png" type="image/png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="chat-header">
    <img src="../imagenes/iconos/ico_logo.png" alt="Perfil">
    <span id="nombreUsuario">NorBot</span>
  </div>

  <div class="chat-body" id="log"></div>

  <div class="chat-footer">
    <input type="text" id="mensaje" placeholder="Escribe tu mensaje aquí...">
    <button id="btnEnviar"><img src="../imagenes/iconos/ico_send.png" alt="Enviar"></button>
  </div>

  <script src="script.js"></script>
</body>
</html>
